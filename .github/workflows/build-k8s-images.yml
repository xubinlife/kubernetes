name: Build and Push Kubernetes Images

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git branch or tag to build, e.g. master, release-1.34, v1.34.7"
        required: true
        default: "master"
        type: string
      image_tag:
        description: "Docker image tag to push, e.g. v1.34.7-custom"
        required: true
        default: "custom"
        type: string
      push_latest:
        description: "Also push :latest"
        required: true
        default: false
        type: boolean
      components:
        description: "Comma-separated components, e.g. kube-apiserver,kube-controller-manager,kube-scheduler,kube-proxy"
        required: true
        default: "kube-apiserver,kube-controller-manager,kube-scheduler,kube-proxy"
        type: string

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 240

    steps:
      - name: Checkout selected source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Show selected source
        run: |
          echo "source_ref=${{ inputs.source_ref }}"
          echo "image_tag=${{ inputs.image_tag }}"
          echo "components=${{ inputs.components }}"
          git rev-parse HEAD
          git describe --tags --always || true
          git status --short || true

      - name: Work around possible git pack index issue
        run: |
          rm -f .git/objects/pack/multi-pack-index || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Kubernetes release images
        env:
          KUBE_BUILD_PLATFORMS: linux/amd64
          KUBE_BUILD_CONFORMANCE: "n"
        run: |
          make quick-release-images

      - name: List generated release image tarballs
        run: |
          find _output/release-images -maxdepth 3 -type f -name "*.tar" | sort

      - name: Load, retag and push selected images
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          COMPONENTS: ${{ inputs.components }}
          PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          set -Eeuo pipefail

          IFS=',' read -ra comps <<< "$COMPONENTS"

          trim() {
            local s="$1"
            s="${s#"${s%%[![:space:]]*}"}"
            s="${s%"${s##*[![:space:]]}"}"
            printf '%s' "$s"
          }

          for raw in "${comps[@]}"; do
            c="$(trim "$raw")"
            [ -n "$c" ] || continue

            tarball="_output/release-images/amd64/${c}.tar"
            if [ ! -f "$tarball" ]; then
              echo "ERROR: missing tarball: $tarball"
              echo "Available files:"
              find _output/release-images -maxdepth 3 -type f -name "*.tar" | sort || true
              exit 1
            fi

            echo "=== Loading ${tarball}"
            docker load -i "$tarball"

            src=""
            while IFS= read -r line; do
              if [[ "$line" =~ /${c}-amd64: ]] || [[ "$line" =~ (^|/)${c}-amd64: ]]; then
                src="$line"
                break
              fi
            done < <(docker images --format '{{.Repository}}:{{.Tag}}')

            if [ -z "$src" ]; then
              echo "ERROR: cannot find loaded source image for component $c"
              docker images
              exit 1
            fi

            dst="${REGISTRY}/${IMAGE_NAMESPACE}/${c}:${IMAGE_TAG}"
            echo "=== Tagging ${src} -> ${dst}"
            docker tag "$src" "$dst"

            echo "=== Pushing ${dst}"
            docker push "$dst"

            if [ "$PUSH_LATEST" = "true" ]; then
              latest="${REGISTRY}/${IMAGE_NAMESPACE}/${c}:latest"
              echo "=== Tagging ${src} -> ${latest}"
              docker tag "$src" "$latest"
              echo "=== Pushing ${latest}"
              docker push "$latest"
            fi
          done

      - name: Print pushed image list
        run: |
          IFS=',' read -ra comps <<< "${{ inputs.components }}"
          for c in "${comps[@]}"; do
            c="$(echo "$c" | xargs)"
            [ -n "$c" ] || continue
            echo "docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${c}:${{ inputs.image_tag }}"
            if [ "${{ inputs.push_latest }}" = "true" ]; then
              echo "docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${c}:latest"
            fi
          done
