name: Build and Push Kubernetes Component Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag, e.g. v1.34.0-custom. Default uses short SHA"
        required: false
        default: ""
      push_latest:
        description: "Also push latest tag"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show git info
        run: |
          git branch --show-current || true
          git rev-parse HEAD
          git status

      - name: Work around possible git multi-pack-index issue
        run: |
          rm -f .git/objects/pack/multi-pack-index || true
          git fsck || true

      - name: Set image tag
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="$(git rev-parse --short=12 HEAD)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Kubernetes release images
        env:
          KUBE_BUILD_PLATFORMS: linux/amd64
          KUBE_BUILD_CONFORMANCE: "n"
        run: |
          make quick-release-images

      - name: List generated image archives
        run: |
          ls -lh _output/release-images/amd64/

      - name: Load, retag and push images
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          set -euo pipefail

          components=(
            kube-apiserver
            kube-controller-manager
            kube-scheduler
            kube-proxy
          )

          for c in "${components[@]}"; do
            tarball="_output/release-images/amd64/${c}.tar"
            if [ ! -f "$tarball" ]; then
              echo "missing tarball: $tarball"
              exit 1
            fi

            echo "Loading $tarball"
            docker load -i "$tarball"

            # 找到刚刚 load 进来的镜像名
            src="$(docker images --format '{{.Repository}}:{{.Tag}}' | grep "/${c}-amd64:" | head -n1 || true)"
            if [ -z "$src" ]; then
              src="$(docker images --format '{{.Repository}}:{{.Tag}}' | grep "${c}-amd64:" | head -n1 || true)"
            fi
            if [ -z "$src" ]; then
              echo "cannot find loaded source image for $c"
              docker images
              exit 1
            fi

            dst="${REGISTRY}/${IMAGE_NAMESPACE}/${c}:${TAG}"
            echo "Tagging $src -> $dst"
            docker tag "$src" "$dst"
            docker push "$dst"

            if [ "${{ github.event.inputs.push_latest }}" = "true" ]; then
              latest="${REGISTRY}/${IMAGE_NAMESPACE}/${c}:latest"
              docker tag "$src" "$latest"
              docker push "$latest"
            fi
          done

      - name: Print pushed images
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          for c in kube-apiserver kube-controller-manager kube-scheduler kube-proxy; do
            echo "docker.io/${IMAGE_NAMESPACE}/${c}:${TAG}"
          done
